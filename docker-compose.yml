services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chaoxing-backend
    init: true
    restart: unless-stopped
    environment:
      CHAOXING_BACKEND_CONFIG: /config/config.yaml
      CHAOXING_WEB_HOST: 0.0.0.0
      CHAOXING_WEB_PORT: "8000"
      CHAOXING_WEB_RELOAD: "false"
      CHAOXING_WEB_RUNTIME_DIR: /data
      CHAOXING_WEB_DATABASE_PATH: /data/chaoxing-web.sqlite3
      CHAOXING_WEB_ACCOUNTS_DIR: /data/accounts
      TZ: Asia/Shanghai
    volumes:
      - ./.docker-data/config:/config
      - ./.docker-data/runtime:/data
    expose:
      - "8000"
    # ports:
    #   - "${BACKEND_PORT_BIND:-127.0.0.1:8000:8000}"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
        VITE_WS_BASE_URL: /ws
        VITE_API_TIMEOUT_MS: -15000
        VITE_BAIDU_MAP_AK: 
    container_name: chaoxing-frontend
    init: true
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT_BIND:-0.0.0.0:5173:80}"
